name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build on Node ${{ matrix.node }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      # Workspaces link lucide-outdoors-vue to the local lucide-outdoors,
      # so no published package is needed.
      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build
